# ╔════════════════════════════════════════════════════════╗
# ║     证言 Testimony.ai - Android APK 打包工作流           ║
# ║  兼容 Forgejo / SynNovator Actions                      ║
# ╚════════════════════════════════════════════════════════╝

name: 📱 Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  ANDROID_SDK_TOOLS: "9477386"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

jobs:
  build-android:
    name: 🔨 构建 Android APK
    runs-on: ubuntu-latest

    steps:
      # ========== 1. 检出代码 ==========
      - name: 📥 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========== 2. 设置 JDK (兼容 Forgejo) ==========
      - name: ☕ 安装 JDK 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openjdk-17-jdk
          java -version
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      # ========== 3. 安装 Android SDK ==========
      - name: 🤖 安装 Android SDK
        run: |
          sudo apt-get install -y wget unzip
          
          # 下载 Android command-line tools
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_SDK_TOOLS}_latest.zip
          unzip -q commandlinetools-linux-${ANDROID_SDK_TOOLS}_latest.zip
          mv cmdline-tools latest
          
          # 设置环境变量
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          
          # 接受许可并安装 SDK 组件
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          
          echo "Android SDK installed successfully"

      # ========== 4. 缓存 Gradle ==========
      - name: 💾 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-android-${{ hashFiles('linxihaven/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-android-

      # ========== 5. 授予 Gradle 执行权限 ==========
      - name: 🔓 授权 Gradlew
        run: |
          cd linxihaven/testimony
          chmod +x gradlew 2>/dev/null || true
          ls -la

      # ========== 6. 构建 Debug APK ==========
      - name: 🔨 构建 Debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == ''
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          cd linxihaven/testimony
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/platform-tools
          ls -la
          ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all
          
      # ========== 7. 构建 Release AAB (签名) ==========
      - name: 🔒 构建 Release AAB (签名)
        if: github.event.inputs.build_type == 'release' && startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd linxihaven/testimony
          
          # 解码签名密钥
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          
          # 创建 keystore 配置
          cat > signing.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF
          
          # 构建签名的 Release AAB
          ./gradlew bundleRelease --no-daemon --stacktrace
          
          # 清理敏感文件
          rm -f app/keystore.jks app/signing.properties

      # ========== 8. 上传产物 ==========
      - name: 📦 上传 Debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == ''
        uses: actions/upload-artifact@v4
        with:
          name: testimony-debug-apk
          path: linxihaven/testimony/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: 📦 上传 Release AAB
        if: github.event.inputs.build_type == 'release' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: testimony-release-aab
          path: linxihaven/testimony/build/outputs/bundle/release/*.aab
          retention-days: 90

      # ========== 9. 创建 Release（仅 tag 触发时）==========
      - name: 🏷️ 创建 Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            linxihaven/testimony/build/outputs/bundle/release/*.aab
          body: |
            ## 证言 Testimony.ai v${GITHUB_REF_NAME#refs/tags/v}
            
            ### 🔐 防伪存证系统
            
            **核心功能：**
            - SHA-256 数字指纹生成（本地计算，不上传服务器）
            - 多源时间锚定证明文件存在性
            - 防伪证书生成与展示
            
            **安装说明：**
            1. 下载 `testimony-release.aab`
            2. 使用 [bundletool](https://github.com/google/bundletool) 或上传到 Google Play
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ========== 10. 构建摘要 ==========
      - name: 📊 构建摘要
        if: always()
        run: |
          echo "## 🔨 构建结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 分支 | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 提交 | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 触发事件 | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建类型 | `${{ github.event.inputs.build_type || 'debug' }}` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 APK 信息" >> $GITHUB_STEP_SUMMARY
          find linxihaven -name "*.apk" -exec ls -lh {} \; 2>/dev/null | awk '{print "| 文件 | "$9" ("$5") |"}' >> $GITHUB_STEP_SUMMARY || echo "APK 未生成" >> $GITHUB_STEP_SUMMARY
